<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Olivijos vandenynas</title>
  <style>
    :root { color-scheme: light; --ink: #21303b; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #e9fbff 0%, #f6fff7 100%);
    }
    main {
      width: min(1480px, calc(100% - 24px));
      margin: 0 auto;
      padding: 18px 0 24px;
    }
    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 4vw, 54px);
      line-height: 1;
      letter-spacing: 0;
    }
    .olivia-ocean-image {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 18px;
    }
    @media (max-width: 640px) {
      main { width: calc(100% - 12px); padding-top: 10px; }
      h1 { margin-bottom: 10px; }
      .olivia-ocean-image { border-radius: 12px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Olivijos vandenynas</h1>
    <img class="olivia-ocean-image" src="assets/olivia-ocean.png" alt="Olivijos vandenynas">
  </main>
</body>
</html>
