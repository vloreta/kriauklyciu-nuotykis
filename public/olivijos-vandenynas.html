<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Olivijos vandenynas</title>
  <style>
    :root { color-scheme: light; --ink: #21303b; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef8e8, #c9f4ff);
      color: var(--ink);
    }
    main {
      width: min(920px, 100%);
      border-radius: 16px;
      background: rgba(255, 255, 255, .82);
      border: 1px solid rgba(14, 149, 171, .18);
      box-shadow: 0 18px 48px rgba(31, 54, 71, .14);
      padding: clamp(28px, 7vw, 72px);
      text-align: center;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <main>
    <h1>Olivijos vandenynas</h1>
  </main>
</body>
</html>
