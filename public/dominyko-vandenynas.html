<!doctype html>
<html lang="lt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dominyko vandenynas</title>
  <style>
    :root { color-scheme: light; --ink: #21303b; --muted: #5f7180; --teal: #1095ab; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; color: var(--ink); font-family: Arial, sans-serif; background: linear-gradient(180deg, #e9fbff 0%, #f6fff7 100%); }
    main { width: 100%; margin: 0 auto; padding: 18px 0 24px; }
    h1 { margin: 0 16px 14px; font-size: clamp(28px, 4vw, 54px); line-height: 1; letter-spacing: 0; }
    .back-to-child { position: fixed; top: 14px; right: 14px; z-index: 20; display: inline-flex; align-items: center; gap: 8px; min-height: 42px; padding: 9px 14px; border-radius: 999px; border: 1px solid rgba(14,149,171,.22); background: rgba(255,255,255,.92); color: #0c718a; font-weight: 900; text-decoration: none; box-shadow: 0 8px 22px rgba(31,54,71,.14); backdrop-filter: blur(8px); }
    .back-to-child:hover { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(31,54,71,.18); }
    .emotion-island { display: grid; grid-template-columns: minmax(170px,18%) minmax(0,max-content); align-items: center; justify-content: start; column-gap: 10px; margin: 0; padding: 10px 6px; border-top: 1px solid rgba(14,149,171,.16); border-bottom: 1px solid rgba(14,149,171,.18); background: linear-gradient(135deg, rgba(244,255,252,.9), rgba(255,253,241,.82)); }
    .emotion-copy { text-align: left; }
    .emotion-copy h3 { margin: 0 0 4px; font-size: 1.21rem; line-height: 1.1; }
    .emotion-copy p { margin: 0; color: var(--muted); font-size: 1.02rem; font-weight: 700; line-height: 1.25; }
    .emotion-options { display: grid; grid-template-columns: repeat(5,minmax(0,1fr)); gap: clamp(3px,.7vw,10px); align-items: start; justify-items: center; }
    .emotion-button { position: relative; display: grid; justify-items: center; align-content: start; gap: 1px; min-width: 0; padding: 0; border: 0; background: transparent; cursor: pointer; color: var(--muted); font: inherit; }
    .emotion-visual { position: relative; display: block; width: clamp(118px,13.5vw,210px); height: clamp(118px,13.5vw,210px); overflow: hidden; border-radius: 999px; }
    .emotion-button img { width: 100%; height: 100%; border-radius: 999px; object-fit: cover; background: transparent; display: block; }
    .emotion-label { font-size: .7rem; line-height: 1.1; color: var(--muted); margin-top: -2px; font-weight: 800; }
    .emotion-button.selected::after { content: "✓"; position: absolute; top: 5px; right: 7px; width: 24px; height: 24px; border-radius: 999px; display: grid; place-items: center; background: var(--teal); color: white; font-size: 16px; font-weight: 900; box-shadow: 0 6px 12px rgba(16,149,171,.22); }
    .emotion-button.selected .emotion-visual::after { content: ""; position: absolute; inset: 8%; border-radius: 999px; border: 3px solid rgba(14,149,171,.42); animation: emotionWave .72s ease-out; pointer-events: none; }
    .emotion-inline-dialog { width: min(260px,100%); margin-top: 4px; padding: 8px 10px; border-radius: 16px; border: 1px solid rgba(14,149,171,.16); background: linear-gradient(135deg, rgba(255,250,232,.96), rgba(238,253,255,.96)); box-shadow: 0 8px 18px rgba(31,54,71,.08); color: var(--ink); animation: emotionDialogIn .2s ease-out; }
    .emotion-inline-dialog p { position: relative; overflow: hidden; margin: 0; font-size: .78rem; font-weight: 850; line-height: 1.22; }
    .emotion-inline-dialog p + p { margin-top: 3px; color: var(--muted); font-weight: 800; }
    .emotion-inline-dialog p::after { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,.88), transparent); transform: translateX(-120%); animation: emotionTextWave .9s ease-out both; pointer-events: none; }
    .emotion-inline-dialog p:nth-child(2)::after { animation-delay: .32s; }
    @keyframes emotionDialogIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes emotionTextWave { 0% { transform: translateX(-120%); } 100% { transform: translateX(120%); } }
    @keyframes emotionWave { 0% { opacity: .7; transform: scale(.72); } 100% { opacity: 0; transform: scale(1.18); } }
    .dominik-ocean-stage { position: relative; width: 100%; overflow: hidden; border-radius: 18px; }
    .dominik-track { position: absolute; left: 32px; right: 116px; top: 50%; height: 46px; transform: translateY(-50%); z-index: 3; }
    .dominik-path { position: absolute; left: 0; right: 0; top: 50%; height: 7px; transform: translateY(-50%); border-radius: 999px; background: rgba(255,255,255,.9); box-shadow: 0 2px 10px rgba(8,56,82,.18); }
    .dominik-progress { position: absolute; left: 0; top: 50%; width: calc(var(--progress-value, 0) * 100%); height: 7px; transform: translateY(-50%); border-radius: 999px; background: linear-gradient(90deg, #d9fff2, #24d75f); }
    .dominik-crab { position: absolute; left: calc(var(--progress-value, 0) * 100%); top: 50%; width: clamp(108px, 11.6vw, 196px); aspect-ratio: 1.42; transform: translate(-50%, -50%); z-index: 4; transition: left .28s ease; background: url("assets/dominik-path-crab.png") center / contain no-repeat; filter: drop-shadow(0 10px 13px rgba(18,72,95,.36)); animation: dominikCrabFloat 2.4s ease-in-out infinite; }`r`n    @keyframes dominikCrabFloat { 0%,100% { transform: translate(-50%, -50%) translateY(0); } 50% { transform: translate(-50%, -50%) translateY(-6px); } }
    .dominik-treasure-shell { position: absolute; right: 16px; top: 56%; width: clamp(72px, 8vw, 120px); aspect-ratio: 1.5; transform: translateY(-50%); background: url("assets/dominik-path-shell.png") center / contain no-repeat; filter: drop-shadow(0 10px 14px rgba(20,73,93,.28)); z-index: 4; }
    .dominik-treasure-shell.collecting { animation: dominikShellGlow .8s ease-in-out; }
    @keyframes dominikShellGlow { 0%,100% { filter: drop-shadow(0 10px 14px rgba(20,73,93,.28)); transform: translateY(-50%) scale(1); } 35% { filter: drop-shadow(0 0 28px rgba(255,255,255,1)) drop-shadow(0 0 34px rgba(120,210,255,.95)); transform: translateY(-50%) scale(1.12); } 65% { filter: drop-shadow(0 0 22px rgba(255,255,255,.95)) drop-shadow(0 0 28px rgba(120,255,170,.85)); transform: translateY(-50%) scale(1.06); } }
    .dominik-score { position: absolute; right: 12px; bottom: 14px; padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,.92); color: #22313d; font-size: clamp(12px, 1.15vw, 16px); font-weight: 800; box-shadow: 0 4px 12px rgba(22,69,89,.12); z-index: 5; }
    .dominik-ocean-image { display: block; width: 100%; height: auto; }
    @media (max-width: 760px) {
      main { padding-top: 10px; }
      .back-to-child { top: 10px; right: 10px; min-height: 38px; padding: 8px 11px; font-size: .9rem; }
      h1 { margin: 0 10px 10px; }
      .dominik-ocean-stage { border-radius: 12px; }
      .dominik-track { left: 12px; right: 68px; height: 34px; }
      .dominik-treasure-shell { right: 8px; width: 62px; }
      .dominik-score { right: 8px; bottom: 8px; padding: 5px 8px; }
      .emotion-island { grid-template-columns: 1fr; row-gap: 6px; }
      .emotion-options { grid-template-columns: repeat(5,minmax(54px,1fr)); gap: 2px; }
      .emotion-visual { width: clamp(64px,17vw,96px); height: clamp(64px,17vw,96px); }
      .emotion-inline-dialog { padding: 7px 8px; }
    }
  </style>
</head>
<body>
  <a class="back-to-child" href="child" aria-label="Grįžti į vaikų puslapį">← Vaikų puslapis</a>
  <main>
    <h1>Dominyko vandenynas</h1>
    <section class="dominik-ocean-stage" aria-label="Dominyko vandenynas">
      <img class="dominik-ocean-image" src="assets/dominik-ocean.png" alt="Dominyko vandenynas">
      <div class="dominik-track" aria-hidden="true" id="dominikTrack">
        <span class="dominik-path"></span><span class="dominik-progress"></span><span class="dominik-crab" aria-hidden="true"></span>
      </div>
      <span class="dominik-treasure-shell" id="dominikTreasureShell" aria-hidden="true"></span>
      <span class="dominik-score" id="dominikScore">0 / 0</span>
    </section>
    <section class="emotion-island" aria-label="Krabukų emocijų sala">
      <div class="emotion-copy"><h3>Krabukų emocijų sala</h3><p>Kaip šiandien jaučiuosi?</p></div>
      <div class="emotion-options" id="emotionOptions"></div>
    </section>
  </main>
  <script>
    const storageKey = "kriauklyciu-nuotykis";
    const dominikTasks = [
      { id: "domSleepAlone", shells: 3 }, { id: "domWakeUp", shells: 3 }, { id: "domBed", shells: 1 },
      { id: "domGettingReady", shells: 1 }, { id: "domToKindergarten", shells: 1 }, { id: "domKindergarten", shells: 1 },
      { id: "domFromKindergarten", shells: 1 }, { id: "domBagShoesJacket", shells: 1 }, { id: "domHands", shells: 1 },
      { id: "domTable", shells: 1 }, { id: "domMeal", shells: 5 }, { id: "domThanksMeal", shells: 1 },
      { id: "domDishes", shells: 1 }, { id: "domNoHurtSister", shells: 5 }, { id: "domPlaySister", shells: 2 },
      { id: "domNiceWordsSister", shells: 2 }, { id: "domMom", shells: 2 }, { id: "domQuietVoice", shells: 5 },
      { id: "domOutsidePlay", shells: 2 }, { id: "domHelp", shells: 2 }, { id: "domThanksNeeded", shells: 1 },
      { id: "domSorry", shells: 2 }, { id: "domChooseActivity", shells: 1 }, { id: "domPraise", shells: 5 },
      { id: "domSpeech", shells: 3 }, { id: "domToysBooks", shells: 2 }
    ];
    const dominikTrack = document.getElementById("dominikTrack");
    const dominikProgress = dominikTrack?.querySelector(".dominik-progress");
    const dominikCrab = dominikTrack?.querySelector(".dominik-crab");
    const dominikScore = document.getElementById("dominikScore");
    const dominikShell = document.getElementById("dominikTreasureShell");
    function currentDateKey() { return new Date().toISOString().slice(0, 10); }
    function readDominikState() { try { return JSON.parse(localStorage.getItem(storageKey) || "null") || {}; } catch { return {}; } }
    function shellWord(count) { const last = count % 10; const lastTwo = count % 100; if (lastTwo >= 11 && lastTwo <= 19) return "kriauklyÄiÅ³"; if (last === 1) return "kriauklytÄ—"; if (last >= 2 && last <= 9) return "kriauklytÄ—s"; return "kriauklyÄiÅ³"; }
    function isDominikTaskDone(day, task) {
      const entries = (day?.log || []).filter(item => item && typeof item !== "string" && item.taskId === task.id && !item.undone).sort((a, b) => String(b.at || "").localeCompare(String(a.at || "")));
      if (entries.length) return entries[0].kind === "complete";
      return Boolean(day?.done?.[task.id]);
    }
    function dominikMaxShells() { return dominikTasks.reduce((sum, task) => sum + task.shells, 0); }
    function dominikVisibleShells(day) {
      const doneTotal = dominikTasks.reduce((sum, task) => isDominikTaskDone(day, task) ? sum + task.shells : sum, 0);
      if (doneTotal > 0) return doneTotal;
      return Math.max(0, Number(day?.shells) || 0);
    }
    function renderDominikProgress() {
      const state = readDominikState();
      const key = state.selectedDate || currentDateKey();
      const day = state.records?.[key]?.dominik || state.records?.[currentDateKey()]?.dominik || {};
      const shells = dominikVisibleShells(day);
      const max = dominikMaxShells();
      const ratio = max > 0 ? Math.min(Math.max(shells / max, 0), 1) : 0;
      if (dominikTrack) dominikTrack.style.setProperty("--progress-value", ratio);
      if (dominikProgress) dominikProgress.style.width = `${ratio * 100}%`;
      if (dominikCrab) dominikCrab.style.left = `${ratio * 100}%`;
      if (dominikScore) dominikScore.textContent = `${shells} / ${max} ${shellWord(max)}`;
    }
    function flashDominikShell() {
      if (!dominikShell) return;
      dominikShell.classList.remove("collecting");
      void dominikShell.offsetWidth;
      dominikShell.classList.add("collecting");
      setTimeout(() => dominikShell.classList.remove("collecting"), 820);
    }
    window.renderDominikProgress = renderDominikProgress;
    window.flashDominikShell = flashDominikShell;
    window.addEventListener("storage", renderDominikProgress);
    document.addEventListener("click", event => {
      if (event.target.closest(".task[data-task], [data-task]")) setTimeout(() => { renderDominikProgress(); flashDominikShell(); }, 80);
    });
    renderDominikProgress();
    const emotions = [
      { id: "happy", label: "Linksmas", image: "assets/emotion-happy.png", dialog: ["Labas!", "Papasakok, kas šiandien tave pradžiugino?"] },
      { id: "calm", label: "Ramus", image: "assets/emotion-calm.png", dialog: ["Šiandien tu atrodai labai ramus.", "Kas tau padėjo taip jaustis?"] },
      { id: "sad", label: "Liūdnas", image: "assets/emotion-sad.png", dialog: ["Aš matau, kad šiandien truputį liūdna...", "Ar nori man papasakoti?"] },
      { id: "angry", label: "Piktas", image: "assets/emotion-angry.png", dialog: ["Oho, matau, kad šiandien pyksti.", "Kas nutiko?"] },
      { id: "scared", label: "Išsigandęs", image: "assets/emotion-scared.png", dialog: ["Aš irgi kartais išsigąstu.", "Kas šiandien tave išgąsdino?"] }
    ];
    const emotionOptionsEl = document.getElementById("emotionOptions");
    let selectedEmotion = null;
    function renderEmotions() {
      emotionOptionsEl.innerHTML = emotions.map(emotion => `<button class="emotion-button${selectedEmotion === emotion.id ? " selected" : ""}" type="button" data-emotion="${emotion.id}" aria-pressed="${selectedEmotion === emotion.id}"><span class="emotion-visual"><img src="${emotion.image}" alt=""></span><span class="emotion-label">${emotion.label}</span>${selectedEmotion === emotion.id ? `<span class="emotion-inline-dialog"><p>${emotion.dialog[0]}</p><p>${emotion.dialog[1]}</p></span>` : ""}</button>`).join("");
    }
    emotionOptionsEl.addEventListener("click", event => {
      const button = event.target.closest(".emotion-button");
      if (!button) return;
      const next = button.dataset.emotion;
      selectedEmotion = selectedEmotion === next ? null : next;
      renderEmotions();
    });
    renderEmotions();
  </script>
</body>
</html>
